<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zemismart">
<meta name="theme-color" content="#1F3864">
<title>Zemismart 견적 계산기</title>

<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Zemismart+%EA%B2%AC%EC%A0%81+%EA%B3%84%EC%82%B0%EA%B8%B0%22%2C%22short_name%22%3A%22Zemismart%22%2C%22description%22%3A%22%EC%8A%A4%EB%A7%88%ED%8A%B8+%EC%A0%84%EB%8F%99+%EB%A1%A4%EC%8A%A4%ED%81%AC%EB%A6%B0+%EB%8F%84%EB%A7%A4+%EA%B2%AC%EC%A0%81+%EA%B3%84%EC%82%B0%EA%B8%B0%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f0f4f8%22%2C%22theme_color%22%3A%22%231F3864%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg+xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27+viewBox%3D%270+0+512+512%27%253E%253Crect+width%3D%27512%27+height%3D%27512%27+rx%3D%2780%27+fill%3D%27%231F3864%27%2F%253E%253Ctext+x%3D%27256%27+y%3D%27340%27+font-size%3D%27280%27+text-anchor%3D%27middle%27%253E%25F0%259F%25AA%259F%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%231F3864'/><text x='256' y='340' font-size='280' text-anchor='middle'>🪟</text></svg>">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #f0f4f8;
    color: #1a2a3a;
    min-height: 100vh;
    padding-bottom: 20px;
  }

  .header {
    background: linear-gradient(135deg, #1F3864 0%, #2E75B6 100%);
    color: white;
    padding: 12px 16px 8px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(31,56,100,0.3);
  }
  .header h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; line-height: 1.3; }
  .header p  { font-size: 11px; opacity: 0.75; margin-top: 3px; }

  /* ── 통화/환율 바 ───────────────────────────────────── */
  .currency-bar {
    background: #1a2f55;
    padding: 8px 12px;
    border-radius: 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .cur-toggle {
    display: flex;
    background: rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 2px;
    gap: 2px;
    flex-shrink: 0;
  }
  .cur-btn {
    padding: 5px 10px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    background: transparent;
    color: rgba(255,255,255,0.6);
    transition: all 0.18s;
    white-space: nowrap;
  }
  .cur-btn.active {
    background: white;
    color: #1F3864;
    box-shadow: 0 1px 6px rgba(0,0,0,0.18);
  }
  .rate-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
    flex: 1;
    justify-content: flex-end;
    min-width: 0;
  }
  .rate-label { font-size: 11px; color: rgba(255,255,255,0.7); white-space: nowrap; }
  .rate-input {
    width: 80px;
    min-width: 0;
    flex-shrink: 1;
    height: 28px;
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 7px;
    background: rgba(255,255,255,0.12);
    color: white;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    outline: none;
    -webkit-appearance: none;
  }
  .rate-input:focus { border-color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.2); }
  .rate-unit { font-size: 11px; color: rgba(255,255,255,0.7); white-space: nowrap; }

  /* ── 공통 ────────────────────────────────────────────── */
  .container { padding: 10px 12px; max-width: 480px; margin: 0 auto; }

  .card {
    background: white;
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }

  /* 카드 제목 행 (제목 + 버튼 나란히) */
  .card-title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 11px; font-weight: 700; color: #2E75B6;
    text-transform: uppercase; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 5px;
  }
  .card-title::before {
    content: ''; display: block; width: 3px; height: 13px;
    background: #2E75B6; border-radius: 2px;
  }
  /* 단독 card-title (버튼 없는 카드) */
  .card > .card-title { margin-bottom: 10px; }

  /* 견적에 추가 버튼 */
  .add-btn {
    background: #2E75B6; color: white; border: none;
    border-radius: 8px; padding: 5px 11px;
    font-size: 12px; font-weight: 700; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
    transition: background 0.15s;
  }
  .add-btn:active { background: #1F5C9A; }

  /* 삭제 버튼 */
  .del-btn {
    background: #fff0f0; color: #d32f2f;
    border: 1px solid #ffb3b3; border-radius: 6px;
    padding: 3px 9px; font-size: 11px; font-weight: 600;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    margin-left: 6px; transition: background 0.15s;
  }
  .del-btn:active { background: #ffcdd2; }

  .field { margin-bottom: 8px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; font-weight: 500; }

  .input-row { display: flex; gap: 8px; }
  .input-row .field { flex: 1; }

  input[type="number"] {
    width: 100%; height: 40px;
    border: 2px solid #e2e8f0; border-radius: 10px;
    font-size: 14px; font-weight: 700; text-align: center;
    color: #1a2a3a; background: #f8fafc; outline: none;
    transition: border-color 0.2s, background 0.2s; -webkit-appearance: none;
  }
  input[type="number"]:focus { border-color: #2E75B6; background: #EEF4FF; }

  .qty-control {
    display: flex; align-items: center;
    border: 2px solid #e2e8f0; border-radius: 10px;
    overflow: hidden; background: #f8fafc; height: 40px;
  }
  .qty-btn {
    width: 40px; height: 100%; font-size: 14px; font-weight: 300;
    color: #2E75B6; background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s;
  }
  .qty-btn:active { background: #dbeafe; }
  .qty-val { flex: 1; text-align: center; font-size: 14px; font-weight: 700; color: #1a2a3a; }

  .area-display {
    background: linear-gradient(135deg, #EEF4FF, #dbeafe);
    border-radius: 10px; padding: 9px 12px;
    display: flex; justify-content: space-between; align-items: center; margin-top: 8px;
  }
  .area-display .label { font-size: 11px; color: #555; font-weight: 500; }
  .area-display .value { font-size: 14px; font-weight: 800; color: #1F3864; }
  .area-display .unit  { font-size: 11px; color: #2E75B6; font-weight: 600; }

  .area-warning {
    display: none; margin-top: 7px;
    background: #fff0f0; border: 1.5px solid #ffb3b3;
    border-radius: 8px; padding: 7px 12px; font-size: 12px; line-height: 1.4;
  }
  .area-warning.show { display: block; }
  .area-warning .warn-red { color: #d32f2f; font-weight: 800; }

  .result-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid #f0f0f0;
  }
  .result-item:last-child { border-bottom: none; }
  .result-item .name   { font-size: 12px; color: #333; flex: 1; }
  .result-item .sub    { font-size: 10px; color: #999; margin-top: 1px; }
  .result-item .amount { font-size: 14px; font-weight: 700; color: #1a2a3a; margin-left: 8px; }

  /* 블라인드 없을 때 안내 */
  .no-blind {
    text-align: center; padding: 12px 0;
    font-size: 12px; color: #aaa;
    border-bottom: 1px solid #f0f0f0;
  }

  .total-card {
    background: linear-gradient(135deg, #1F3864 0%, #2E75B6 100%);
    border-radius: 14px; padding: 13px 16px; margin-bottom: 8px;
    box-shadow: 0 4px 16px rgba(31,56,100,0.35);
    display: flex; justify-content: space-between; align-items: center;
  }
  .total-card .label  { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.85); }
  .total-card .amount { font-size: 14px; font-weight: 800; color: white; }

  /* 앱 설치 배너 */
  #installBanner {
    display: none; background: linear-gradient(135deg, #0f5132, #198754);
    border-radius: 14px; padding: 10px 14px; margin-bottom: 8px;
    box-shadow: 0 4px 16px rgba(25,135,84,0.3); align-items: center; gap: 10px;
  }
  #installBanner.show { display: flex; }
  #installBanner .text { flex: 1; color: white; }
  #installBanner .text strong { display: block; font-size: 12px; margin-bottom: 1px; }
  #installBanner .text span   { font-size: 11px; opacity: 0.85; }
  #installBtn {
    background: white; color: #198754; border: none; border-radius: 8px;
    padding: 7px 12px; font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
  #installBtn:active { opacity: 0.8; }

  /* 마진율 + 제안가격 */
  .margin-card { background: white; border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .margin-row  { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .margin-row label { font-size: 12px; color: #333; font-weight: 500; white-space: nowrap; }
  .margin-input-wrap {
    display: flex; align-items: center; border: 2px solid #e2e8f0;
    border-radius: 10px; overflow: hidden; background: #f8fafc; height: 40px; flex: 1;
  }
  .margin-input-wrap:focus-within { border-color: #2E75B6; background: #EEF4FF; }
  .margin-input-wrap input {
    flex: 1; height: 100%; border: none; background: none;
    font-size: 14px; font-weight: 700; text-align: center;
    color: #1a2a3a; outline: none; -webkit-appearance: none;
  }
  .margin-input-wrap span { padding-right: 10px; font-size: 14px; font-weight: 600; color: #2E75B6; }

  .suggest-row {
    background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
    border-radius: 10px; padding: 10px 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .suggest-row .label  { font-size: 12px; font-weight: 600; color: #2e7d32; }
  .suggest-row .sub    { font-size: 10px; color: #558b2f; margin-top: 1px; }
  .suggest-row .amount { font-size: 14px; font-weight: 800; color: #1b5e20; }

  /* 단가 참고표 */
  .toggle-btn {
    width: 100%; background: white; border: none; border-radius: 14px;
    padding: 11px 14px; font-size: 12px; font-weight: 600; color: #2E75B6;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; transition: background 0.15s;
  }
  .toggle-btn:active { background: #f0f4f8; }
  .toggle-icon { font-size: 15px; transition: transform 0.2s; }
  .toggle-icon.open { transform: rotate(180deg); }
  .price-table { display: none; }
  .price-table.open { display: block; }
  .price-table .card { margin-top: -6px; border-radius: 0 0 14px 14px; padding-top: 10px; }
  .pt-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f5f5f5; font-size: 12px; }
  .pt-row:last-child { border-bottom: none; }
  .pt-row .range { color: #555; }
  .pt-row .price { font-weight: 700; color: #2E75B6; }
  .pt-row.highlight { background: #FFF9C4; border-radius: 5px; padding: 7px 8px; margin: 0 -8px; }

  .note { font-size: 10.5px; color: #888; text-align: center; margin-top: 5px; line-height: 1.5; }
</style>
</head>
<body>

<div class="header">
  <h1>🪟 Zemismart<br>스마트 전동 롤스크린 견적 계산기</h1>
  <p>통화 단위 : USD · 국제 배송비 별도</p>
</div>

<div class="container">

  <!-- 통화 · 환율 설정 바 -->
  <div class="currency-bar">
    <div class="cur-toggle">
      <button id="btnUSD" class="cur-btn active" onclick="setCurrency('USD')">USD</button>
      <button id="btnKRW" class="cur-btn"        onclick="setCurrency('KRW')">KRW</button>
    </div>
    <div class="rate-wrap">
      <span class="rate-label">환율</span>
      <input class="rate-input" type="number" id="exRate" value="1600" min="1" step="10" inputmode="numeric" oninput="calc()">
      <span class="rate-unit">원/$</span>
    </div>
  </div>

  <!-- 앱 설치 배너 -->
  <div id="installBanner">
    <div class="text">
      <strong>📲 앱으로 설치하기</strong>
      <span>홈화면에 추가하면 앱처럼 사용 가능</span>
    </div>
    <button id="installBtn" onclick="installApp()">설치</button>
  </div>

  <!-- 창문 크기 입력 -->
  <div class="card">
    <div class="card-title-row">
      <div class="card-title">창문 크기</div>
      <button class="add-btn" onclick="addBlind()">+ 견적에 추가</button>
    </div>
    <div class="input-row">
      <div class="field">
        <label>가로 (m)</label>
        <input type="number" id="width" value="1.5" min="0.1" step="0.1" inputmode="decimal" oninput="calcPreview()">
      </div>
      <div class="field">
        <label>세로 (m)</label>
        <input type="number" id="height" value="1.0" min="0.1" step="0.1" inputmode="decimal" oninput="calcPreview()">
      </div>
    </div>
    <div class="area-display">
      <span class="label">계산된 면적</span>
      <span><span class="value" id="areaVal">1.50</span> <span class="unit">㎡</span></span>
    </div>
    <div class="area-warning" id="areaWarning">
      <span class="warn-red">경고!</span> 최대 면적(7.5㎡) 초과 재입력 바람
    </div>
  </div>

  <!-- 수량 입력 -->
  <div class="card">
    <div class="card-title">수량</div>
    <div class="field">
      <label>Zigbee 유선 모터 (25mm) ZM25Z — $39.00/대</label>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('motor',-1)">−</button>
        <span class="qty-val" id="motorVal">1</span>
        <button class="qty-btn" onclick="changeQty('motor',1)">+</button>
      </div>
    </div>
    <div class="field" style="margin-top:8px;">
      <label>16채널 다이얼 리모컨 ZMR16 — $11.00/개</label>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('remote',-1)">−</button>
        <span class="qty-val" id="remoteVal">1</span>
        <button class="qty-btn" onclick="changeQty('remote',1)">+</button>
      </div>
    </div>
  </div>

  <!-- 견적 금액 -->
  <div class="card">
    <div class="card-title">견적 금액</div>
    <div class="result-item">
      <div>
        <div class="name">Zigbee 유선 모터 ZM25Z</div>
        <div class="sub" id="motorSub"></div>
      </div>
      <div class="amount" id="motorAmt"></div>
    </div>
    <div class="result-item">
      <div>
        <div class="name">16채널 다이얼 리모컨 ZMR16</div>
        <div class="sub" id="remoteSub"></div>
      </div>
      <div class="amount" id="remoteAmt"></div>
    </div>
    <!-- 블라인드 목록 (동적 렌더링) -->
    <div id="blindList"></div>
  </div>

  <!-- 총합계 -->
  <div class="total-card">
    <span class="label">총 합계</span>
    <span class="amount" id="totalAmt"></span>
  </div>

  <!-- 마진율 + 제안가격 -->
  <div class="margin-card">
    <div class="margin-row">
      <label>마진율</label>
      <div class="margin-input-wrap">
        <input type="number" id="margin" value="30" min="0" max="99" step="1" inputmode="numeric" oninput="calc()">
        <span>%</span>
      </div>
    </div>
    <div class="suggest-row">
      <div>
        <div class="label">제안 가격</div>
        <div class="sub" id="suggestSub"></div>
      </div>
      <div class="amount" id="suggestAmt"></div>
    </div>
  </div>

  <!-- 단가 참고표 -->
  <button class="toggle-btn" onclick="toggleTable()">
    <span>📋 원단 단가 참고표 (면적별)</span>
    <span class="toggle-icon" id="toggleIcon">▼</span>
  </button>
  <div class="price-table" id="priceTable">
    <div class="card">
      <div id="priceRows"></div>
      <p class="note" style="margin-top:10px;">※ 100% 암막 원단 + 알루미늄 상·하 레일 포함<br>면적이 클수록 ㎡당 단가 낮아짐</p>
    </div>
  </div>

</div>

<script>
const MOTOR_PRICE  = 39;
const REMOTE_PRICE = 11;

const AREA_TIERS = [
  { max: 1.0,      price: 18.00 },
  { max: 1.5,      price: 17.00 },
  { max: 2.0,      price: 16.00 },
  { max: 2.5,      price: 15.50 },
  { max: 3.0,      price: 15.00 },
  { max: 3.5,      price: 14.50 },
  { max: 4.0,      price: 14.00 },
  { max: 4.5,      price: 13.50 },
  { max: 5.0,      price: 13.00 },
  { max: 5.5,      price: 12.80 },
  { max: 6.0,      price: 12.50 },
  { max: 6.5,      price: 12.30 },
  { max: 7.0,      price: 12.00 },
  { max: 7.5,      price: 11.80 },
  { max: Infinity, price: 11.80 },
];

const TIER_LABELS = [
  '~ 1.0㎡ 이하','1.0 ~ 1.5㎡','1.5 ~ 2.0㎡','2.0 ~ 2.5㎡',
  '2.5 ~ 3.0㎡','3.0 ~ 3.5㎡','3.5 ~ 4.0㎡','4.0 ~ 4.5㎡',
  '4.5 ~ 5.0㎡','5.0 ~ 5.5㎡','5.5 ~ 6.0㎡','6.0 ~ 6.5㎡',
  '6.5 ~ 7.0㎡','7.0 ~ 7.5㎡','7.5㎡ 초과',
];

// ── 상태 ─────────────────────────────────────────────────
let motorQty  = 1;
let remoteQty = 1;
let currency  = 'USD';
let deferredPrompt = null;

// 블라인드 목록 (초기값: 1개)
let blinds = [{ w: 1.5, h: 1.0 }];

// ── 통화 포맷터 ──────────────────────────────────────────
function getRate() { return parseFloat(document.getElementById('exRate').value) || 1600; }

function fmt(usd) {
  if (currency === 'KRW') {
    const krw = Math.round(usd * getRate());
    return '₩' + krw.toLocaleString('ko-KR');
  }
  return '$' + usd.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function fmtUnit(usd) {
  if (currency === 'KRW') {
    return '₩' + Math.round(usd * getRate()).toLocaleString('ko-KR') + '/㎡';
  }
  return '$' + usd.toFixed(2) + '/㎡';
}

function setCurrency(c) {
  currency = c;
  document.getElementById('btnUSD').classList.toggle('active', c === 'USD');
  document.getElementById('btnKRW').classList.toggle('active', c === 'KRW');
  calc();
}

// ── 창문 크기 입력 미리보기 (목록에 반영 안 함) ──────────
function calcPreview() {
  const w    = parseFloat(document.getElementById('width').value)  || 0;
  const h    = parseFloat(document.getElementById('height').value) || 0;
  const area = w * h;
  document.getElementById('areaVal').textContent = area.toFixed(2);
  document.getElementById('areaWarning').classList.toggle('show', area > 7.5);
  renderPriceTable(area);
}

// ── 견적에 추가 ──────────────────────────────────────────
function addBlind() {
  const w    = parseFloat(document.getElementById('width').value)  || 0;
  const h    = parseFloat(document.getElementById('height').value) || 0;
  const area = w * h;
  if (w <= 0 || h <= 0) {
    alert('가로/세로 값을 입력해주세요.');
    return;
  }
  if (area > 7.5) {
    alert('최대 면적(7.5㎡)을 초과합니다.\n크기를 확인해주세요.');
    return;
  }
  blinds.push({ w, h });
  calc();
}

// ── 블라인드 삭제 ────────────────────────────────────────
function removeBlind(idx) {
  if (!confirm('삭제하겠습니까?')) return;
  blinds.splice(idx, 1);
  calc();
}

// ── 블라인드 목록 렌더링 ─────────────────────────────────
function renderBlinds() {
  if (blinds.length === 0) {
    document.getElementById('blindList').innerHTML =
      '<div class="no-blind">블라인드 없음 — 창문 크기 입력 후 "견적에 추가" 버튼을 누르세요</div>';
    return;
  }
  const html = blinds.map((b, i) => {
    const area      = b.w * b.h;
    const unitPrice = AREA_TIERS.find(t => area <= t.max).price;
    const amt       = area * unitPrice;
    return `<div class="result-item">
      <div style="flex:1;min-width:0">
        <div class="name">블라인드 원단 #${i + 1} (맞춤 제작)</div>
        <div class="sub">${area.toFixed(2)}㎡ (${b.w}×${b.h}) × ${fmtUnit(unitPrice)}</div>
      </div>
      <div class="amount">${fmt(amt)}</div>
      <button class="del-btn" onclick="removeBlind(${i})">삭제</button>
    </div>`;
  }).join('');
  document.getElementById('blindList').innerHTML = html;
}

// ── 전체 계산 ────────────────────────────────────────────
function calc() {
  const margin = parseFloat(document.getElementById('margin').value) || 0;

  // 모터 · 리모컨
  const motorAmt  = motorQty  * MOTOR_PRICE;
  const remoteAmt = remoteQty * REMOTE_PRICE;

  // 블라인드 합계
  let fabricTotal = 0;
  blinds.forEach(b => {
    const area = b.w * b.h;
    const u    = AREA_TIERS.find(t => area <= t.max).price;
    fabricTotal += area * u;
  });

  const total   = motorAmt + remoteAmt + fabricTotal;
  const suggest = total * (1 + margin / 100);

  document.getElementById('motorSub').textContent   = motorQty  + '대 × ' + fmt(MOTOR_PRICE);
  document.getElementById('motorAmt').textContent   = fmt(motorAmt);
  document.getElementById('remoteSub').textContent  = remoteQty + '개 × ' + fmt(REMOTE_PRICE);
  document.getElementById('remoteAmt').textContent  = fmt(remoteAmt);
  document.getElementById('totalAmt').textContent   = fmt(total);
  document.getElementById('suggestSub').textContent = '마진 ' + margin + '% 적용';
  document.getElementById('suggestAmt').textContent = fmt(suggest);

  renderBlinds();

  // 미리보기 영역도 갱신
  const w    = parseFloat(document.getElementById('width').value)  || 0;
  const h    = parseFloat(document.getElementById('height').value) || 0;
  const area = w * h;
  document.getElementById('areaVal').textContent = area.toFixed(2);
  document.getElementById('areaWarning').classList.toggle('show', area > 7.5);
  renderPriceTable(area);
}

function changeQty(type, delta) {
  if (type === 'motor') {
    motorQty = Math.max(0, motorQty + delta);
    document.getElementById('motorVal').textContent = motorQty;
  } else {
    remoteQty = Math.max(0, remoteQty + delta);
    document.getElementById('remoteVal').textContent = remoteQty;
  }
  calc();
}

function renderPriceTable(currentArea) {
  const currentIdx = AREA_TIERS.findIndex(t => currentArea <= t.max);
  const rows = AREA_TIERS.slice(0, 14).map((t, i) => {
    const active = i === currentIdx;
    return `<div class="pt-row${active ? ' highlight' : ''}">
      <span class="range">${active ? '▶ ' : ''}${TIER_LABELS[i]}</span>
      <span class="price">${fmtUnit(t.price)}</span>
    </div>`;
  });
  document.getElementById('priceRows').innerHTML = rows.join('');
}

function toggleTable() {
  const table = document.getElementById('priceTable');
  const icon  = document.getElementById('toggleIcon');
  icon.classList.toggle('open', table.classList.toggle('open'));
}

// ── PWA ──────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
  deferredPrompt = null;
});
async function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') document.getElementById('installBanner').classList.remove('show');
  deferredPrompt = null;
}

if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'zemismart-v3';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

calc();
</script>
